services:
  - type: worker
    name: xense-mqtt-bridge
    runtime: node
    buildCommand: npm install
    startCommand: npx tsx scripts/mqtt-bridge.ts
    envVars:
      - key: MQTT_BROKER_URL
        value: mqtts://a480ae87e6974650ba20764b3db2d7a9.s1.eu.hivemq.cloud:8883
      - key: MQTT_USERNAME
        value: esp32-xs-001
      - key: MQTT_PASSWORD
        sync: false
      - key: MQTT_TOPIC_PREFIX
        value: xense
      - key: DATABASE_URL
        sync: false
